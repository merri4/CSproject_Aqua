services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - ../rag:/rag:ro
    env_file:
      - ./backend/.env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    command: bash -lc "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env
    command: sh -lc "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend
